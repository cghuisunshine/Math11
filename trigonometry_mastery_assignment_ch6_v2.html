<head>

  <title>Trigonometry Mastery Assignment (Ch. 6) V2</title>

  <style>
    :root {
      --bg: #f4f5f6;
      --paper: #fff;
      --ink: #111;
      --muted: #666;
      --line: #d8d8d8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--line);
      padding: 16px 20px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    nav a,
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }

    button { cursor: pointer; }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }

    .page {
      margin: 0 0 24px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    .page h2 {
      margin: 0;
      padding: 10px 14px;
      background: #e9e9e9;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    @media print {
      header { display: none; }

      body { background: #fff; }

      main {
        max-width: none;
        padding: 0;
      }

      .page {
        margin: 0;
        border: 0;
        border-radius: 0;
        page-break-after: always;
      }

      .page h2 { display: none; }
    }
  </style>
</head>
